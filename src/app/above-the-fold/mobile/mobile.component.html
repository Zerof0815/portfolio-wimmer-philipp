<div class="max-width-container">
    <div class="above-the-fold">
        <div class="logo-menu">
            <div class="logo">
                <img src="assets/img/atf/logo-icon.png" alt="">
                <p class="anta-font">P.Wimmer</p>
                <p class="theme-color">Developer</p>
            </div>
            <button (click)="toggleMenu()">
                <img src="{{imageSource}}" alt="">
            </button>
        </div>
        <div class="picture-menu-wrapper">
            <div class="burger-menu" [class.open]="menuOpen">
                <div class="links-container">
                    <a (click)="menuOpen = false" [routerLink]="[]" fragment="why-me">{{ texts[languageService.currentLang()].why}}</a>
                    <a (click)="menuOpen = false" [routerLink]="[]" fragment="my-skills">{{ texts[languageService.currentLang()].skills}}</a>
                    <a (click)="menuOpen = false" [routerLink]="[]" fragment="my-projects">{{ texts[languageService.currentLang()].projects}}</a>
                    <a (click)="menuOpen = false" [routerLink]="[]" fragment="contact-me">{{ texts[languageService.currentLang()].contact}}</a>
                    <div class="language">
                        <div class="lang-bg" [ngClass]="{'active': languageService.currentLang() === 'DE'}">
                            <button (click)="languageService.setLanguage('DE')">DE</button>
                        </div>
                        <div class="lang-bg" [ngClass]="{'active': languageService.currentLang() === 'EN'}">
                            <button (click)="languageService.setLanguage('EN')">EN</button>
                        </div>
                    </div>
                </div>
                <img src="assets/img/atf/shape.png" alt="">
            </div>
            <div class="my-picture-container" [class.hidden]="menuOpen">
                <img class="shape shape-default" src="assets/img/atf/shape.png" alt="">
                <img class="shape shape-hover" src="assets/img/atf/shape-hover.png" alt="">
                <img class="my-picture" src="assets/img/atf/stiker-4574586_1280.png" alt="">
            </div>
        </div>
        <div class="info-section">
            <h1>Philipp Wimmer</h1>
            <h2>FRONTEND DEVELOPER</h2>
            <div class="arrow-wrap">
                <a [routerLink]="[]" fragment="why-me">
                    <img class="arrow-down" src="assets/img/atf/arrow-down.png" alt="">
                </a>
            </div>
        </div>
    </div>
</div>
