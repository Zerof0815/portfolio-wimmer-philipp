<section id="above-the-fold">
  @if (screenWidth >= 890) {
    <app-above-the-fold></app-above-the-fold>
  } @else {
    <app-mobile></app-mobile>
  }
</section>

<header class="sticky-header">
  <app-header></app-header>
</header>

<div class="max-width-container">
  <section id="why-me"><app-why-me></app-why-me></section>
  <section id="my-skills"><app-my-skills></app-my-skills></section>
  @if (screenWidth >= 1000) {
    <section id="my-projects"><app-my-projects></app-my-projects></section>
  } @else {
    <section id="my-projects"><app-mobile-projects></app-mobile-projects></section>
  }
  <section id="contact-me"><app-contact-me></app-contact-me></section>
</div>

<app-footer></app-footer>
